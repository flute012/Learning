.translation-switch {
    position: relative;
    display: inline-block;
    width: 80px;
    height: 34px;
    vertical-align: middle;
    margin: 0;
}

.translation-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #f0f0f0;
    transition: .4s;
    border-radius: 34px;
    overflow: hidden;
    border: 1px solid #ddd;
}

/* 兩種語言標籤 */
.lang-label {
    position: absolute;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s;
}

.lang-en {
    left: 0;
}

.lang-zh {
    right: 0;
}

/* 滑塊 */
.slider:before {
    position: absolute;
    content: "";
    height: 26px;
    width: 36px;
    left: 4px;
    bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 34px;
    z-index: 1;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* 當前選中的語言高亮顯示 */
input:not(:checked) + .slider .lang-en {
    color: #4a90e2;
    font-weight: bold;
    z-index: 2;
}

input:checked + .slider .lang-zh {
    color: #4a90e2;
    font-weight: bold;
    z-index: 2;
}

input:checked + .slider {
    background-color: #f0f0f0;
}

input:checked + .slider:before {
    transform: translateX(36px);
}

        // 中英翻譯功能
        function toggleTranslation() {
            translationVisible = !translationVisible;
            
            // 更新開關狀態
            document.getElementById('translationToggle').checked = translationVisible;
            
            const translations = document.querySelectorAll('.translation');
            translations.forEach(translation => {
                translation.style.display = translationVisible ? 'block' : 'none';
            });
        }

        function initializePage() {
            let processedWords = [];
            let globalWordIndex = 0;

            // 先列出所有片語，並按長度降序排序
            const phrases = Object.keys(wordInfo)
                .filter(key => key.includes(' '))
                .sort((a, b) => b.length - a.length);

            console.log('需要處理的片語:', phrases);

            // 建立更靈活的正則表達式
            const phraseRegexes = phrases.map(phrase => {
                // 產生兩種匹配模式：原始大小寫和首字母大寫
                const originalRegex = new RegExp(`\\b${phrase.replace(/\s+/g, '\\s+')}\\b`, 'gi');
                const capitalizedRegex = new RegExp(`\\b${phrase.split(' ').map(w => 
                    w.charAt(0).toUpperCase() + w.slice(1)
                ).join('\\s+')}\\b`, 'g');

                return {
                    originalRegex,
                    capitalizedRegex,
                    phrase
                };
            });

            // 分段處理文本
            const paragraphs = originalText.split('\n\n').map((paragraph, paragraphIndex) => {
                let paragraphWords = [];
                let remainingText = paragraph;
                let matchedPhrases = new Set();

                // 先嘗試匹配片語
                phraseRegexes.forEach(({originalRegex, capitalizedRegex, phrase}) => {
                    // 嘗試匹配原始和首字母大寫的形式
                    const matchRegexes = [originalRegex, capitalizedRegex];
                    
                    matchRegexes.forEach(regex => {
                        while (true) {
                            const match = remainingText.match(regex);
                            if (!match) break;

                            const index = remainingText.indexOf(match[0]);
                            
                            // 處理匹配前的文本
                            if (index > 0) {
                                const beforeWords = remainingText.slice(0, index).split(/\s+/);
                                beforeWords.forEach(word => {
                                    if (word) {
                                        const cleanWord = word.toLowerCase().replace(/[^a-z]/g, '');
                                        paragraphWords.push({
                                            type: 'word',
                                            text: word,
                                            cleanWord: cleanWord
                                        });
                                    }
                                });
                            }

                            // 添加片語
                            paragraphWords.push({
                                type: 'phrase',
                                text: match[0],
                                original: phrase
                            });

                            // 標記已匹配的片語
                            matchedPhrases.add(phrase);

                            // 更新剩餘文本
                            remainingText = remainingText.slice(index + match[0].length).trim();
                        }
                    });
                });

                // 調試輸出
                console.log(`第 ${paragraphIndex + 1} 段落匹配的片語:`, Array.from(matchedPhrases));

                // 添加剩餘的單詞
                if (remainingText) {
                    const remainingWords = remainingText.split(/\s+/);
                    remainingWords.forEach(word => {
                        if (word) {
                            const cleanWord = word.toLowerCase().replace(/[^a-z]/g, '');
                            paragraphWords.push({
                                type: 'word',
                                text: word,
                                cleanWord: cleanWord
                            });
                        }
                    });
                }

                return {
                    words: paragraphWords,
                    index: paragraphIndex
                };
            });

            // 調試輸出：所有未匹配的片語
            const allPhrases = new Set(phrases);
            paragraphs.forEach(paragraph => {
                paragraph.words.forEach(item => {
                    if (item.type === 'phrase') {
                        allPhrases.delete(item.original);
                    }
                });
            });
            console.log('未匹配的片語:', Array.from(allPhrases));

            // 渲染 HTML
// 渲染 HTML
            article.innerHTML = paragraphs.map((paragraph, index) => {
                const paragraphHTML = paragraph.words.map(item => {
                    if (item.type === 'phrase') {
                        const classes = ['phrase', 'clickable'];
                        if (wordInfo[item.original]) {
                            classes.push('bold');
                        }
                        return `<span class="${classes.join(' ')}" data-phrase="${item.original}">${item.text}</span>`;
                    } else {
                        const classes = ['clickable'];
                        if (wordInfo[item.cleanWord]) {
                            classes.push('bold');
                        }
                        return `<span id="word${globalWordIndex++}" class="${classes.join(' ')}">${item.text}</span>`;
                    }
                }).join(' ');

                // 在正確的段落顯示翻譯
                let translation = '';
                if (index === 1) {
                    // 第二段結束時顯示合併的 1-2 段翻譯
                    translation = chineseTranslation['paragraph1'];
                } else if (index === 8) {
                    // 第七段顯示合併的 7-8 段翻譯
                    translation = chineseTranslation['paragraph7'];
                } else if (index === 0 || index === 6) {
                    // 第一段和第八段不顯示翻譯
                    translation = '';
                } else {
                    // 其他段落正常顯示翻譯
                    translation = chineseTranslation[`paragraph${index + 1}`] || '';
                }

                const translationHTML = translation ? `<div class="translation" style="white-space: pre-line;">${translation}</div>` : '';

                return `
                    <p>${paragraphHTML}</p>
                    ${translationHTML}
                `;
            }).join('\n\n');

            // 為所有可點擊元素添加事件監聽器
            document.querySelectorAll('.clickable').forEach(element => {
                element.addEventListener('click', function() {
                    // 處理單字點擊
                    if (this.classList.contains('phrase')) {
                        const phrase = this.getAttribute('data-phrase');
                        if (phrase && wordInfo[phrase]) {
                            showPhraseInfo(phrase);
                        }
                        speakWord(this.textContent);
                    } else {
                        const word = this.textContent;
                        const cleanWord = word.toLowerCase().replace(/[^a-z]/g, '');
                        if (wordInfo[cleanWord]) {
                            showWordInfo(word);
                        }
                        speakWord(word);
                    }

                    // 如果正在播放全文，暫停播放
                    if (isPlaying) {
                        synth.pause();
                        isPlaying = false;
                        playPauseBtn.textContent = '▶';
                    }
                });
            });

            // 添加點擊按鈕功能
            speedBtn.addEventListener('click', toggleSpeedControl);
            
            // 初始化翻譯開關事件
            document.getElementById('translationToggle').addEventListener('change', function() {
                translationVisible = this.checked;
                const translations = document.querySelectorAll('.translation');
                translations.forEach(translation => {
                    translation.style.display = translationVisible ? 'block' : 'none';
                });
            });

            return paragraphs.map(p => p.words).flat();
        }

        function initializeSpeedControl() {
            const speedBtn = document.getElementById('speedBtn');
            const speedModal = document.getElementById('speedModal');
            const speedControlModal = document.getElementById('speedControlModal');
            const modalSpeedValue = document.getElementById('modalSpeedValue');
            const speedPresetBtns = document.querySelectorAll('.speed-preset-btn');
            
            // 初始速度設置
            currentRate = 1.0;
            document.getElementById('speedValue').textContent = currentRate.toFixed(1) + 'x';
            
            // 速度按鈕點擊事件 - 打開模態窗
            speedBtn.addEventListener('click', function() {
                speedModal.style.display = 'block';
                // 更新滑動條位置
                speedControlModal.value = currentRate;
                modalSpeedValue.textContent = currentRate + 'x';
                updateSpeedPresetActive(currentRate);
                updateSpeedLabel(currentRate);
            });
            
            // 點擊模態窗背景關閉
            speedModal.addEventListener('click', function(e) {
                if (e.target === speedModal) {
                    speedModal.style.display = 'none';
                }
            });
            
            // 滑動條事件
            speedControlModal.addEventListener('input', function() {
                const newRate = parseFloat(this.value);
                // 四捨五入到最近的0.05
                const roundedRate = Math.round(newRate * 20) / 20;
                
                currentRate = roundedRate;
                modalSpeedValue.textContent = currentRate.toFixed(2) + 'x';
                document.getElementById('speedValue').textContent = currentRate.toFixed(1) + 'x';
                
                updateSpeedPresetActive(currentRate);
                updateSpeedLabel(currentRate);
                
                // 如果正在播放，更新速度
                updatePlaybackSpeed();
            });
            
            // 預設速度按鈕
            speedPresetBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const presetSpeed = parseFloat(this.dataset.speed);
                    currentRate = presetSpeed;
                    
                    // 更新UI
                    speedControlModal.value = presetSpeed;
                    modalSpeedValue.textContent = presetSpeed.toFixed(2) + 'x';
                    document.getElementById('speedValue').textContent = presetSpeed.toFixed(1) + 'x';
                    
                    // 更新按鈕激活狀態
                    updateSpeedPresetActive(presetSpeed);
                    updateSpeedLabel(presetSpeed);
                    
                    // 如果正在播放，更新速度
                    updatePlaybackSpeed();
                });
            });
            
            // 更新播放速度
            function updatePlaybackSpeed() {
                if (synth.speaking && isPlaying) {
                    // 儲存當前位置
                    const currentText = utterance.text;
                    const currentPosition = synth.speaking ? 
                        Math.floor(currentText.length * (1 - synth.speaking / 100)) : 
                        0;
                    
                    // 取消當前播放
                    synth.cancel();
                    
                    // 用新的速度重新開始播放
                    if (isPlaying) {
                        speak(currentPosition);
                    }
                }
            }
        }

        function showPhraseInfo(phrase) {
            const info = wordInfo[phrase];
            if (info) {
                wordInfoDiv.innerHTML = `
                    <h3>片語資訊</h3>
                    <p>片語：${phrase}</p>
                    <p>音標：${info.phonetic}</p>
                    <p>詞性：${info.partOfSpeech}</p>
                    <p>中文意思：${info.meaning}</p>
                `;
                wordInfoDiv.style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        }

        function togglePlayPause() {
            if (isPlaying) {
                synth.pause();
                currentPosition = synth.speaking ? utterance.text.length - utterance.text.length : 0;
                playPauseBtn.textContent = '▶';
                isPlaying = false;
            } else {
                if (synth.paused) {
                    synth.resume();
                } else {
                    speak(currentPosition);
                }
                playPauseBtn.textContent = '❚❚';
                isPlaying = true;
            }
        }

        function getWordIndexFromPosition(position) {
            let words = originalText.substring(0, position).split(/\s+/);
            return words.length - 1;
        }

                showWordInfo(word);

            speakWord(word);

        function restartFromCurrentPosition() {

        function checkBrowserSupport() {
            let support = {
                speechSynthesis: 'speechSynthesis' in window,
                speechSynthesisUtterance: 'SpeechSynthesisUtterance' in window,
                onvoiceschanged: 'onvoiceschanged' in speechSynthesis
            };
            
            console.log('Browser support:', support);
        }

        let defaultVoice = null;
        let defaultPitch = 1.0;
        let defaultRate = 1.0;

        function initializeSpeech() {
            if ('speechSynthesis' in window) {
                synth = window.speechSynthesis;
                
                // 檢測是否為 iOS 設備
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                
                // 獲取並設置預設語音
                let voices = synth.getVoices();
                if (voices.length === 0) {
                    synth.onvoiceschanged = () => {
                        voices = synth.getVoices();
                        setPreferredVoice(voices, isIOS);
                    };
                } else {
                    setPreferredVoice(voices, isIOS);
                }
            } else {
                console.log('This browser does not support speech synthesis');
                document.getElementById('playPauseBtn').disabled = true;
            }
        }

        function setPreferredVoice(voices, isIOS) {
            // 為 iOS 設備選擇最佳語音
            if (isIOS) {
                // 嘗試找到 Samantha 語音 (iOS 的高質量語音之一)
                defaultVoice = voices.find(voice => 
                    voice.name.includes('Samantha') && voice.lang === 'en-US'
                ) || voices.find(voice => 
                    voice.name.includes('Karen') && voice.lang === 'en-US'
                ) || voices.find(voice => 
                    voice.lang === 'en-US' && !voice.localService
                );
                
                // iOS 特定的語音設置
                defaultPitch = 1.1;  // 稍微提高音調
                defaultRate = 0.9;   // 稍微降低速度
            } else {
                // Android 和其他設備使用 Google 語音
                defaultVoice = voices.find(voice => 
                    voice.lang === 'en-US' && 
                    voice.name.includes('Google')
                ) || voices.find(voice => 
                    voice.lang === 'en-US'
                );
                
                defaultPitch = 1.0;
                defaultRate = 1.0;
            }
        }

        function speakWord(word) {
    synth.cancel();
    let wordUtterance = new SpeechSynthesisUtterance(word);
    
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    if (defaultVoice) {
        wordUtterance.voice = defaultVoice;
    }
    
    wordUtterance.lang = 'en-US';
    wordUtterance.pitch = defaultPitch;
    
    // iOS 設備特別處理
    if (isIOS) {
        // 根據單字長度動態調整速率
        if (word.length <= 4) {
            wordUtterance.rate = currentRate * 0.9;  // 短單字稍慢
        } else {
            wordUtterance.rate = currentRate * 0.95; // 長單字接近正常速度
        }
    } else {
        wordUtterance.rate = currentRate;
    }
    
    // 重點單字的特殊處理
    const cleanWord = word.toLowerCase().replace(/[^a-z]/g, '');
    if (wordInfo[cleanWord]) {
        if (isIOS) {
            wordUtterance.rate *= 0.8;  // iOS 設備上的重點單字更慢
            wordUtterance.pitch = 1.2;  // 稍微提高音調以增加清晰度
        } else {
            wordUtterance.rate = Math.min(currentRate, 0.8);
        }
    }
    
    synth.speak(wordUtterance);
}

        function speak(startPosition = 0) {
            // 清除現有高亮
            document.querySelectorAll('.highlight').forEach(el => {
                el.classList.remove('highlight');
            });
            
            const text = originalText.substring(startPosition);
            utterance = new SpeechSynthesisUtterance(text);
            
            // 基本設置
            if (defaultVoice) {
                utterance.voice = defaultVoice;
            }
            utterance.lang = 'en-US';
            utterance.rate = currentRate;
            
            // 獲取所有單字元素
            const wordElements = document.querySelectorAll('.clickable');
            let charCount = 0;
            let elementIndexMap = new Map();
            
            // 建立字符位置到元素索引的映射
            wordElements.forEach((element, index) => {
                const text = element.textContent;
                const start = charCount;
                charCount += text.length + 1; // +1 for space
                elementIndexMap.set(start, index);
            });
            
            // 處理邊界事件
            utterance.onboundary = function(event) {
                if (event.name === 'word') {
                    const charIndex = event.charIndex;
                    
                    // 找到最接近的元素索引
                    let closestStart = 0;
                    let elementIndex = 0;
                    
                    for (let [start, index] of elementIndexMap) {
                        if (start <= charIndex && start > closestStart) {
                            closestStart = start;
                            elementIndex = index;
                        }
                    }
                    
                    // 使用 requestAnimationFrame 更新高亮
                    requestAnimationFrame(() => {
                        // 移除前一個高亮
                        document.querySelectorAll('.highlight').forEach(el => {
                            el.classList.remove('highlight');
                        });
                        
                        // 添加新的高亮
                        const currentElement = wordElements[elementIndex];
                        if (currentElement) {
                            currentElement.classList.add('highlight');
                            
                            // 滾動到當前元素
                            const scrollableContent = document.getElementById('scrollable-content');
                            const elementTop = currentElement.offsetTop;
                            const containerTop = scrollableContent.scrollTop;
                            const containerHeight = scrollableContent.clientHeight;
                            
                            if (elementTop < containerTop || 
                                elementTop > containerTop + containerHeight - 100) {
                                scrollableContent.scrollTo({
                                    top: elementTop - containerHeight / 2,
                                    behavior: 'smooth'
                                });
                            }
                        }
                    });
                }
            };
            
            utterance.onend = function() {
                playPauseBtn.textContent = '▶';
                isPlaying = false;
                currentIndex = 0;
                currentPosition = 0;
                document.querySelectorAll('.highlight').forEach(el => {
                    el.classList.remove('highlight');
                });
            };
            
            synth.cancel();
            synth.speak(utterance);
            isPlaying = true;
            playPauseBtn.textContent = '❚❚';
        }

        function highlightNext() {
            const wordElements = document.querySelectorAll('.clickable');
            
            if (currentIndex > 0) {
                const previousWord = wordElements[currentIndex - 1];
                if (previousWord) {
                    previousWord.classList.remove('highlight');
                }
            }

            if (currentIndex < wordElements.length) {
                const currentWordElement = wordElements[currentIndex];
                if (currentWordElement) {
                    currentWordElement.classList.add('highlight');
                    
                    // 滾動邏輯
                    const scrollableContent = document.getElementById('scrollable-content');
                    const wordPosition = currentWordElement.offsetTop;
                    const scrollPosition = scrollableContent.scrollTop;
                    const scrollableHeight = scrollableContent.clientHeight;

                    if (wordPosition < scrollPosition || wordPosition > scrollPosition + scrollableHeight - 100) {
                        scrollableContent.scrollTo({
                            top: wordPosition - scrollableHeight / 2,
                            behavior: 'smooth'
                        });
                    }

                    currentIndex++;
                }
            }
        }

        // 初始化頁面
        window.onload = function() {
            initializePage();
            initializeSpeech();
            initializeSpeedControl();
            
            // 為 overlay 添加點擊事件
            document.getElementById('overlay').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeWordInfo();
                }
            });

            // 為 wordInfo div 添加點擊事件，防止點擊內容時關閉
            document.getElementById('wordInfo').addEventListener('click', function(event) {
                event.stopPropagation();
            });
            
            // 添加點擊背景關閉功能
            document.getElementById('instructionsModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    toggleInstructions();
                }
            });
            
            // 確保速度模態窗在按ESC時關閉
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('speedModal').style.display = 'none';
                }
            });
        };
